
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Romantic Interactive Experience</title>
    <style>
        /* =========================================================
           BASE STYLES & RESET
           ========================================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Prevent text selection and tap highlights on mobile */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* Prevent scrollbars from particles */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fce4ec, #e1bee7, #ce93d8, #f3e5f5, #ede7f6);
            background-size: 400% 400%;
            animation: dreamyGradient 15s ease infinite;
            touch-action: none; /* Prevent browser handling of gestures like swipe-to-scroll */
            position: relative;
        }

        /* Dreamy background gradient animation */
        @keyframes dreamyGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Soft vignette overlay to focus attention on the center */
        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, transparent 30%, rgba(186, 104, 200, 0.15) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* =========================================================
           MAIN HEART & INITIAL SCREEN
           ========================================================= */
        #heart-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            /* Gently pulsing animation */
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); filter: drop-shadow(0 0 10px rgba(224, 64, 251, 0.4)); }
            50% { transform: translate(-50%, -50%) scale(1.08); filter: drop-shadow(0 0 25px rgba(224, 64, 251, 0.8)); }
            100% { transform: translate(-50%, -50%) scale(1); filter: drop-shadow(0 0 10px rgba(224, 64, 251, 0.4)); }
        }

        .main-heart-svg {
            /* Responsive sizing */
            width: clamp(160px, 45vw, 280px);
            height: clamp(160px, 45vw, 280px);
            overflow: visible; /* Prevents glow clipping */
        }

        .heart-text {
            position: absolute;
            color: #ffffff;
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: bold;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
            pointer-events: none; /* Clicks pass through to the container */
            white-space: nowrap;
            /* Slight upward shift to visually center on the heart's geometric weight */
            margin-top: -15px; 
            letter-spacing: 1px;
        }

        /* =========================================================
           PARTICLES & EXPLOSION EFFECTS
           ========================================================= */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 15;
            top: 0; 
            left: 0;
            transform-origin: center;
            will-change: transform, opacity;
        }

        .sparkle {
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffffff, 0 0 15px #ea80fc;
        }

        /* =========================================================
           BACKGROUND FLOATING HEARTS
           ========================================================= */
        .bg-heart {
            position: absolute;
            pointer-events: none;
            z-index: 0;
            will-change: transform, opacity;
            bottom: -50px;
        }

        /* =========================================================
           FINAL MESSAGE SCREEN
           ========================================================= */
        #final-message-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            display: none; /* Hidden until explosion finishes */
            text-align: center;
        }

        .final-text {
            color: #ffffff;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            white-space: nowrap;
            text-shadow: 0 0 15px rgba(234, 128, 252, 0.8), 
                         0 0 30px rgba(179, 136, 255, 0.6),
                         0 0 45px rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
            position: relative;
            z-index: 25;
        }

        /* Container for the orbiting hearts */
        #orbit-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1px;
            height: 1px;
            z-index: 24;
        }

        .orbit-heart {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: center;
            will-change: transform;
        }
    </style>
</head>
<body>

    <div id="vignette"></div>

    <div id="heart-container">
        <svg class="main-heart-svg" viewBox="0 0 24 24">
            <defs>
                <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ea80fc" />
                    <stop offset="100%" stop-color="#b388ff" />
                </linearGradient>
                <filter id="mainGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="1" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>
            <path fill="url(#mainGrad)" filter="url(#mainGlow)" 
                  d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        <div class="heart-text">Click Me ❤️</div>
    </div>

    <div id="final-message-container">
        <div id="orbit-container"></div>
        <div class="final-text">I Love You ❤️</div>
    </div>

    <script>
        /* =========================================================
           CONFIGURATION & CONSTANTS
           ========================================================= */
        // Strict adherence to pastel/purple/violet/white theme (No Red)
        const themeColors = ['#ea80fc', '#b388ff', '#ce93d8', '#ffffff', '#f8bbd0', '#e040fb'];
        const heartContainer = document.getElementById('heart-container');
        const finalMessageContainer = document.getElementById('final-message-container');
        const orbitContainer = document.getElementById('orbit-container');
        
        // Boolean flag to prevent double-triggering
        let isExploded = false;

        /* =========================================================
           BACKGROUND FLOATING HEARTS SYSTEM
           ========================================================= */
        function spawnBackgroundHeart() {
            const bgHeart = document.createElement('div');
            bgHeart.className = 'bg-heart';
            bgHeart.innerHTML = '❤️';
            
            // Randomize aesthetic properties
            const color = themeColors[Math.floor(Math.random() * themeColors.length)];
            const size = 10 + Math.random() * 25; // 10px to 35px
            const opacity = 0.1 + Math.random() * 0.4; // Soft transparency
            
            bgHeart.style.color = color;
            bgHeart.style.fontSize = size + 'px';
            bgHeart.style.opacity = opacity.toString();
            bgHeart.style.textShadow = `0 0 10px ${color}`;
            
            // Random horizontal start position across the screen width
            bgHeart.style.left = (Math.random() * 100) + 'vw';
            
            document.body.appendChild(bgHeart);

            // Animation configuration
            const duration = 6000 + Math.random() * 6000; // 6s to 12s float time
            const sway = (Math.random() * 60) - 30; // Random sway angle
            
            // Animate using Web Animations API for smooth performance
            bgHeart.animate([
                { transform: 'translateY(100vh) rotate(0deg) scale(1)' },
                { transform: `translateY(-20vh) rotate(${sway}deg) scale(${1 + Math.random()*0.5})` }
            ], {
                duration: duration,
                easing: 'linear',
                fill: 'forwards'
            });

            // Cleanup DOM to prevent memory leaks
            setTimeout(() => {
                if (bgHeart.parentNode) bgHeart.remove();
            }, duration);
        }

        // Continuously spawn background hearts
        setInterval(spawnBackgroundHeart, 400);

        /* =========================================================
           INTERACTION LOGIC (Click / Tap)
           ========================================================= */
        // Use 'pointerdown' for unified, instantaneous mouse and touch support
        heartContainer.addEventListener('pointerdown', (e) => {
            if (isExploded) return; // Enforce single explosion
            isExploded = true;

            // 1. Hide the large heart and text completely and permanently
            heartContainer.style.display = 'none';

            // Calculate center coordinates safely, fallback to screen center
            const rect = heartContainer.getBoundingClientRect();
            let originX = e.clientX !== undefined ? e.clientX : rect.left + rect.width / 2;
            let originY = e.clientY !== undefined ? e.clientY : rect.top + rect.height / 2;

            // 2. Trigger the magical explosion
            triggerExplosion(originX, originY);

            // 3. Sequence the final message appearance after the explosion clears (~1.6s)
            setTimeout(() => {
                revealFinalMessage();
            }, 1600);
        });

        /* =========================================================
           EXPLOSION PARTICLE SYSTEM
           ========================================================= */
        function triggerExplosion(x, y) {
            const particleCount = 120; // High particle count for emotional impact

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                const isSparkle = Math.random() > 0.55; // Mix of shapes

                if (isSparkle) {
                    particle.className = 'particle sparkle';
                    const size = 3 + Math.random() * 5;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                } else {
                    particle.className = 'particle heart-particle';
                    particle.innerHTML = '❤️';
                    const color = themeColors[Math.floor(Math.random() * themeColors.length)];
                    particle.style.color = color;
                    particle.style.fontSize = (12 + Math.random() * 20) + 'px';
                    particle.style.textShadow = `0 0 10px ${color}`;
                }

                // Initial position at click epicenter
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                document.body.appendChild(particle);

                // Math for 360-degree outward explosion
                const angle = Math.random() * Math.PI * 2;
                // Cubic distribution pushes most particles outward with a nice spread
                const velocity = 60 + Math.pow(Math.random(), 2) * 350; 
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                
                // Randomize individual particle lifespans for an organic feel
                const duration = 1200 + Math.random() * 800;

                particle.animate([
                    { transform: 'translate(-50%, -50%) scale(1) rotate(0deg)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(${Math.random() * 0.8 + 0.2}) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], {
                    duration: duration,
                    easing: 'cubic-bezier(0.15, 0.9, 0.3, 1)', // Fast start, gentle deceleration
                    fill: 'forwards'
                });

                // Cleanup
                setTimeout(() => {
                    if (particle.parentNode) particle.remove();
                }, duration);
            }
        }

        /* =========================================================
           FINAL MESSAGE & ORBITING HEARTS
           ========================================================= */
        function revealFinalMessage() {
            finalMessageContainer.style.display = 'block';

            // Build dynamic orbiting hearts before showing
            createOrbitingHearts();

            // Fade in and scale up the main message
            finalMessageContainer.animate([
                { opacity: 0, transform: 'translate(-50%, -50%) scale(0.5)', filter: 'blur(10px)' },
                { opacity: 1, transform: 'translate(-50%, -50%) scale(1)', filter: 'blur(0px)' }
            ], {
                duration: 2000,
                easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)',
                fill: 'forwards'
            });
        }

        function createOrbitingHearts() {
            const orbitCount = 6;
            // Responsive orbit radius: looks great on mobile and desktop
            const radius = Math.min(window.innerWidth * 0.35, 160);

            for (let i = 0; i < orbitCount; i++) {
                const orbitHeart = document.createElement('div');
                orbitHeart.className = 'orbit-heart';
                orbitHeart.innerHTML = '❤️';
                
                const color = themeColors[i % themeColors.length];
                orbitHeart.style.color = color;
                orbitHeart.style.fontSize = (20 + Math.random() * 15) + 'px';
                orbitHeart.style.textShadow = `0 0 15px ${color}`;
                
                orbitContainer.appendChild(orbitHeart);

                // Calculate starting angle for even distribution
                const angle = (i / orbitCount) * 360;

                // Animate to perfectly orbit while keeping the heart physically upright
                // Accomplished by rotating container coords, translating, then reverse rotating the child
                orbitHeart.animate([
                    { transform: `translate(-50%, -50%) rotate(${angle}deg) translateY(-${radius}px) rotate(-${angle}deg)` },
                    { transform: `translate(-50%, -50%) rotate(${angle + 360}deg) translateY(-${radius}px) rotate(-${angle + 360}deg)` }
                ], {
                    duration: 8000, // Smooth, slow rotation
                    iterations: Infinity,
                    easing: 'linear'
                });
            }
        }

        /* =========================================================
           INITIALIZATION
           ========================================================= */
        // Pre-populate some background hearts so the screen isn't empty on load
        for(let i=0; i<10; i++) {
            setTimeout(spawnBackgroundHeart, i * 200);
        }
    </script>
</body>
</html>
